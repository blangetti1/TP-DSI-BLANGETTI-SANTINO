    <from>
        <form action="https://formspree.io/f/mdkggqor" method="POST" class="formulario">
      
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="Apellido">Apellido:</label>
            <input type="text" id="Apellido" name="Apellido" required>

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required>
          
            <label for="mensaje">Año de Ingreso:</label>
            <input type="number" id="anio" name="anio" required>
            
            <label for="Legajo">Legajo:</label>
            <input type="number" id="Legajo" name="Legajo" required>

            <label for="DNI FRENTE Y REVERSO">Foto de DNI (frente y reverso)</label>
            <input type="file" id="file" name="file" required>
          
            <button type="submit" class="boton-enviar">Enviar</button>
          </form>
